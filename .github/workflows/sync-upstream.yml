name: Sync upstream

on:
  schedule:
    # 每天北京时间 06:00 (UTC 22:00 前一日)
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_URL: https://github.com/jundot/omlx.git
      UPSTREAM_BRANCH: main
      PATCHES_BRANCH: patches
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.PATCHES_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "sync-bot"
          git config user.email "sync-bot@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream "$UPSTREAM_URL"
          git fetch upstream "$UPSTREAM_BRANCH" --tags

      - name: Fast-forward main from upstream
        run: |
          git checkout -B main upstream/$UPSTREAM_BRANCH
          git push origin main --tags --force-with-lease

      - name: Rebase patches onto upstream
        id: rebase
        run: |
          git checkout "$PATCHES_BRANCH"
          if git rebase upstream/$UPSTREAM_BRANCH; then
            echo "status=ok" >> "$GITHUB_OUTPUT"
          else
            git rebase --abort || true
            echo "status=conflict" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.rebase.outputs.status == 'ok'
        with:
          python-version: '3.11'

      - name: Syntax check
        if: steps.rebase.outputs.status == 'ok'
        id: build
        continue-on-error: true
        run: |
          python -m py_compile \
            omlx/engine/jang.py \
            omlx/engine_pool.py \
            omlx/model_discovery.py \
            omlx/models/vlm.py

      - name: Push rebased patches
        if: steps.rebase.outputs.status == 'ok' && steps.build.outcome == 'success'
        run: |
          if [ "$(git rev-parse HEAD)" = "$(git rev-parse origin/$PATCHES_BRANCH)" ]; then
            echo "Nothing to push"
            exit 0
          fi
          git push origin "$PATCHES_BRANCH" --force-with-lease

      - name: Report failure
        if: steps.rebase.outputs.status == 'conflict' || steps.build.outcome == 'failure'
        run: |
          echo "::error::Upstream sync failed — rebase=${{ steps.rebase.outputs.status }}, build=${{ steps.build.outcome }}"
          echo ""
          echo "Resolve locally:"
          echo "  jj git fetch"
          echo "  jj rebase -d main@origin -s patches"
          echo "  jj resolve     # 如果出现冲突"
          echo "  jj git push -b patches"
          exit 1
